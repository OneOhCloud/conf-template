name: Daily Cache Build

on:
  schedule:
    - cron: '0 2 * * *'   # Daily at 02:00 UTC
  workflow_dispatch:       # Allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  build-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout database branch
        uses: actions/checkout@v4
        with:
          ref: database

      - name: Build caches for all environments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for BRANCH in dev beta stable; do
            echo "::group::Building $BRANCH"

            # Fetch conf from env branch
            rm -rf _source
            git clone --depth 1 --branch "$BRANCH" --filter=blob:none --sparse \
              "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" _source
            (cd _source && git sparse-checkout set conf)

            # Fetch build script from dev branch
            rm -rf _scripts
            git clone --depth 1 --branch dev --filter=blob:none --sparse \
              "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" _scripts
            (cd _scripts && git sparse-checkout set .github/scripts)

            ENV_BRANCH="$BRANCH" python3 _scripts/.github/scripts/build_cache.py

            echo "::endgroup::"
          done

      - name: Force-push single commit to database branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add database/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit --amend -m "chore: rule cache databases — updated $(date -u +%Y-%m-%d) [skip ci]"
            git push origin database --force
          fi
